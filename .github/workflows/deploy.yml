name: CI/CD Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  lint-and-typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Prisma Generate
        run: npx prisma generate

      - name: Lint
        run: npm run lint

      - name: Type Check
        run: npx tsc --noEmit

  build-and-test:
    needs: lint-and-typecheck
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: furniture
        ports:
          - 5433:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: "postgresql://postgres:postgres@localhost:5433/furniture?schema=public"
      JWT_SECRET: "test-secret"
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Prisma Generate
        run: npx prisma generate

      - name: Prisma DB Push
        run: npx prisma db push

      - name: Next.js Build
        run: npm run build

  deploy:
    needs: build-and-test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Deploy to Server via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          script: |
            # Navigate to the project folder
            cd /home/mcp-admin/furniture
            
            # Fetch the latest code and reset to match origin/main
            # This ensures any manual hotfixes on the server are overwritten by the repo
            git fetch origin main
            git reset --hard origin/main

            # Rebuild and start the app container
            # Using --build to force fresh image creation with new code
            docker compose up -d --build web
            
            # Sync database schema (using project's internal prisma)
            docker compose exec -T web npx prisma db push
            
            # CRITICAL: Clean up Docker build cache to prevent disk bloat (The 34GB issue)
            # This removes build cache that isn't used by the current active build
            docker builder prune -af --filter "until=24h"
            
            echo "Deployment successful and disk cleaned!"
