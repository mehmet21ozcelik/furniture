name: CI/CD Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  lint-and-typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Prisma Generate
        run: npx prisma generate

      - name: Lint
        run: npm run lint

      - name: Type Check
        run: npx tsc --noEmit

  build-and-test:
    needs: lint-and-typecheck
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: furniture
        ports:
          - 5433:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: "postgresql://postgres:postgres@localhost:5433/furniture?schema=public"
      JWT_SECRET: "test-secret"
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Prisma Generate
        run: npx prisma generate

      - name: Prisma DB Push
        run: npx prisma db push

      - name: Next.js Build
        run: npm run build

  deploy:
    needs: build-and-test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Deploy to Server via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          command_timeout: 20m
          script: |
            # Navigate to the project folder
            cd /home/mcp-admin/furniture
            
            # Sync with origin
            git fetch origin main
            git reset --hard origin/main
            
            # 1. PRE-CLEANUP
            echo "Pre-cleanup..."
            docker system prune -f --filter "until=24h"
            
            # 2. BUILD & RESTART
            echo "Building and starting..."
            docker compose down
            docker compose up -d --build
            
            # 3. VERIFICATION & DB SYNC
            echo "Waiting for containers to stabilize..."
            sleep 15
            
            echo "Checking container status:"
            docker ps
            
            echo "Checking logs for DB sync status:"
            docker compose logs web | tail -n 20
            
            echo "Forcing a secondary DB sync just in case..."
            docker compose exec -T web prisma db push --accept-data-loss
            
            # 4. POST-CLEANUP
            echo "Post-cleanup..."
            docker builder prune -af --filter "until=1h" &
            docker image prune -f --filter "label=project=furniture" &
            
            echo "Deployment finished. Check logs above for any Prisma errors."
            
            echo "Deployment successful! The application will update the database on startup."
